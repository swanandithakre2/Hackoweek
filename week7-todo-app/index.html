<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GreenTask | Nature Productivity</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <header class="app-header">
            <div class="header-content">
                <h1><i class="fas fa-leaf"></i> GreenTask</h1>
                <p>Stay productive, naturally</p>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <span class="stat-number" id="totalTasks">0</span>
                    <span class="stat-label">Total</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="completedTasks">0</span>
                    <span class="stat-label">Done</span>
                </div>
                <div class="stat-item">
                    <span class="stat-number" id="pendingTasks">0</span>
                    <span class="stat-label">Pending</span>
                </div>
            </div>
        </header>

        <div class="input-section">
            <form id="taskForm" class="task-input-form">
                <input type="text" id="taskInput" placeholder="What needs to be done?" autocomplete="off">
                <button type="submit" class="add-btn">
                    <i class="fas fa-plus"></i> Add
                </button>
            </form>
        </div>

        <div class="filter-section">
            <button class="filter-btn active" data-filter="all">All</button>
            <button class="filter-btn" data-filter="pending">Pending</button>
            <button class="filter-btn" data-filter="completed">Completed</button>
        </div>

        <div class="tasks-container">
            <ul class="task-list" id="taskList">
            </ul>
            <div class="empty-state" id="emptyState">
                <i class="fas fa-check-circle"></i>
                <p>All caught up! Add a new task above.</p>
            </div>
        </div>

        <div class="actions-section">
            <button class="clear-btn" id="clearCompleted">
                <i class="fas fa-check-double"></i> Mark All Done
            </button>
            <button class="clear-btn danger" id="clearAll">
                <i class="fas fa-trash"></i> Clear All
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
